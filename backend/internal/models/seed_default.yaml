# Public Model Hub seed list. Loaded at startup; can be overridden at
# runtime via KNAIC_PUBLIC_MODELS=/path/to/models.yaml.
#
# Seeding only fires when the public scope of the configured Store
# (Postgres or in-memory) is empty. Once admins create/edit/delete models
# through the UI those changes are authoritative — restarting knaic does
# not re-apply this list.
#
# `scheme` defaults to "hf" when omitted. `tags` and `modelType` are free-
# form; the UI groups by `modelType` (llm | embedding | diffusion | …).
# `collectionId`, `parentModelId` and `derivedKind` are optional; when
# present the UI groups variants together on the Collections tab and the
# detail page renders a model tree linking parent ↔ derivatives.
collections:
  - id: col-qwen35
    name: Qwen3.5
    description: |
      Alibaba's Qwen3.5 series — chat + base models across multiple sizes,
      sharing tokenizer and instruction-following alignment.
    iconColor: "#722ED1"
  - id: col-llama33
    name: Llama 3.3
    description: |
      Meta's Llama 3.3 release. Instruct variants tuned for general chat
      and tool-use.
    iconColor: "#13C2C2"
  - id: col-sd3
    name: Stable Diffusion 3
    description: |
      Stability AI's Stable Diffusion 3 family of text-to-image diffusion
      models.
    iconColor: "#EB2F96"

