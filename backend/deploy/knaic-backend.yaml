# knaic backend deployment template.
#
# Bundled image: serves the React UI at / and the Go API at /api/v1, both
# from the same Go binary.
#
# Before applying, replace the placeholders marked `EDIT:` with values that
# match your cluster (namespace, container image, OIDC issuer, hostname,
# Prometheus endpoint, cert-manager ClusterIssuer, etc.).
#
# Apply with:
#   kubectl -n <your-namespace> apply -f knaic-backend.yaml
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: knaic-backend
  namespace: knaic-system   # EDIT: namespace where knaic will run
---
# With OIDC enabled, knaic-api impersonates the verified user when talking
# to the apiserver, so per-user Kubernetes RBAC drives what the UI can do.
# The SA still needs broad reach for two reasons:
#   1. Platform-admin paths (e.g. cluster-scope GPU status) bypass
#      impersonation and use the SA directly — see internal/api/gpu.go.
#   2. `impersonate` on users/groups/serviceaccounts is required to forward
#      every other request as the caller.
#
# This template keeps the cluster-admin grant for the SA — it's the
# shortest path to a working environment. Production deployments should
# replace this with a narrow `knaic-impersonator` ClusterRole per the
# backend README's "Apiserver impersonation" section.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: knaic-backend-cluster-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: knaic-backend
    namespace: knaic-system   # EDIT: must match the SA namespace above
---
# OIDC client secret. Generated by your identity provider when you register
# the knaic OAuth2 client. knaic-api needs it for the authorization-code
# token exchange, not just to verify ID tokens.
apiVersion: v1
kind: Secret
metadata:
  name: knaic-oidc
  namespace: knaic-system   # EDIT
type: Opaque
stringData:
  # EDIT: replace with the client secret for the knaic OIDC client.
  client-secret: REPLACE_ME
---
# Optional: HTTP basic-auth credentials for Prometheus / VictoriaMetrics.
# Only needed if KNAIC_PROMETHEUS_AUTH=basic below. Delete this Secret and
# the corresponding env vars on the Deployment if your metrics endpoint
# doesn't need basic auth.
apiVersion: v1
kind: Secret
metadata:
  name: knaic-prom-auth
  namespace: knaic-system   # EDIT
type: Opaque
stringData:
  username: REPLACE_ME      # EDIT
  password: REPLACE_ME      # EDIT
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: knaic-backend
  namespace: knaic-system   # EDIT
  labels:
    app.kubernetes.io/name: knaic-backend
    app.kubernetes.io/part-of: knaic
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: knaic-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: knaic-backend
        app.kubernetes.io/part-of: knaic
    spec:
      serviceAccountName: knaic-backend
      # The opencode sidecar (opencode-server) is bun-compiled; knaic-api
      # bounces it via SIGTERM whenever the provider catalog changes
      # (opencode 1.14.41 does not hot-reload opencode.json). That requires
      # both containers to live in the same PID namespace.
      shareProcessNamespace: true
      containers:
        - name: knaic-api
          # EDIT: replace with the image you built and pushed for knaic.
          image: REGISTRY/knaic:TAG
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: KNAIC_ADDR
              value: ":8080"
            - name: KNAIC_SYSTEM_NAMESPACE
              value: knaic-system   # EDIT
            # OIDC against your identity provider (Dex, Keycloak, etc.).
            - name: KNAIC_AUTH_DISABLED
              value: "false"
            - name: KNAIC_OIDC_ISSUER
              value: "https://oidc.example.com"   # EDIT
            - name: KNAIC_OIDC_CLIENT_ID
              value: "knaic"                       # EDIT (must match the OAuth2 client you registered)
            - name: KNAIC_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: knaic-oidc
                  key: client-secret
            # Space-separated. Includes `groups` so the verifier can map the
            # groups claim to IsPlatformAdmin.
            - name: KNAIC_OIDC_SCOPES
              value: "openid profile email groups"
            # Set to "false" once your OIDC issuer's TLS cert is trusted by
            # the container's root CA bundle.
            - name: KNAIC_OIDC_INSECURE_SKIP_VERIFY
              value: "false"
            # OIDC claim used as the impersonated apiserver username.
            # Must match `--oidc-username-claim` on your apiserver.
            - name: KNAIC_OIDC_USERNAME_CLAIM
              value: "email"
            # OIDC group whose members are treated as platform admins.
            # Members of this group bypass per-namespace RBAC checks.
            - name: KNAIC_OIDC_ADMIN_GROUP
              value: "knaic:platform-admins"   # EDIT to match a real group in your IdP
            # Allowed CORS origins for the dev / preview frontend. Add more
            # entries as needed.
            - name: KNAIC_CORS_ORIGINS
              value: "http://localhost:4300,http://localhost:5173"
            # Cluster identity surfaced in the UI header.
            - name: KNAIC_CLUSTER_NAME
              value: "my-cluster"                  # EDIT
            - name: KNAIC_PLATFORM_URL
              value: "https://platform.example.com"  # EDIT (optional)
            # Optional: Prometheus / VictoriaMetrics endpoint for the
            # monitoring pages. Delete this block and the knaic-prom-auth
            # Secret above if you don't need metrics.
            - name: KNAIC_PROMETHEUS_URL
              value: "http://prometheus.monitoring.svc:9090"   # EDIT
            - name: KNAIC_PROMETHEUS_AUTH
              value: "basic"   # one of "", "forward", "bearer", "basic"
            - name: KNAIC_PROMETHEUS_BASIC_USER
              valueFrom:
                secretKeyRef:
                  name: knaic-prom-auth
                  key: username
            - name: KNAIC_PROMETHEUS_BASIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: knaic-prom-auth
                  key: password
            # Switch the playground agent runner from per-turn CLI fork to
            # HTTP client of the opencode-server sidecar. The runner writes
            # opencode.json into /etc/oc so the sidecar picks it up on
            # (re)start, then talks to /session/:id/message over loopback.
            - name: KNAIC_OPENCODE_URL
              value: "http://127.0.0.1:4096"
            - name: KNAIC_OPENCODE_CONFIG
              value: "/etc/oc/opencode.json"
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          # The agent runner (opencode) writes per-session config + state
          # under $KNAIC_AGENT_WORKDIR (default /tmp/knaic-agent). With
          # readOnlyRootFilesystem=true /tmp is on the read-only layer,
          # so we mount an emptyDir tmpfs there. Anything else that wants
          # to scribble in /tmp (helm temp files, k8s discovery cache)
          # gets the same writable surface.
          #
          # opencode is Bun-compiled — Bun caches downloads + scripts
          # under $HOME/.cache/bun, so /home/nonroot needs to be
          # writable too. Distroless's nonroot home is empty, so a
          # plain emptyDir there is the simplest fix.
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: home
              mountPath: /home/nonroot
            - name: oc-config
              mountPath: /etc/oc
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
        - name: opencode
          # EDIT: same image as knaic-api above.
          image: REGISTRY/knaic:TAG
          imagePullPolicy: IfNotPresent
          # OPENCODE_CONFIG isn't honored by `opencode serve` as a path
          # override; the binary loads $HOME/.config/opencode/opencode.json
          # unconditionally. So instead of fighting it, mount the shared
          # config volume directly at that path. knaic-api writes to
          # /etc/oc/opencode.json on its side, which is the SAME file on
          # this side via the shared emptyDir.
          command:
            - /usr/local/bin/opencode
            - serve
            - --port
            - "4096"
            - --hostname
            - "127.0.0.1"
            - --log-level
            - INFO
            - --print-logs
          env:
            # opencode caches Bun downloads + SQLite under $HOME. /home/oc is
            # an emptyDir (the distroless image doesn't ship this path).
            - name: HOME
              value: /home/oc
            # Skip the CWD walk for a project-local .opencode/.
            - name: OPENCODE_DISABLE_PROJECT_CONFIG
              value: "1"
            - name: OPENCODE_FAST_BOOT
              value: "1"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: oc-home
              mountPath: /home/oc
            # Overlays the shared config volume at the path opencode reads
            # at startup. Same emptyDir as knaic-api's /etc/oc mount, so the
            # opencode.json knaic-api writes is what opencode loads.
            - name: oc-config
              mountPath: /home/oc/.config/opencode
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
        - name: home
          emptyDir:
            sizeLimit: 256Mi
        # Shared between knaic-api (writer) and opencode (reader). knaic-api
        # rewrites opencode.json on every provider mutation and SIGTERMs the
        # sidecar so it re-reads the file on restart.
        #
        # Sized for ~64Mi of bun-installed opencode plugins. The mount is
        # /home/oc/.config/opencode on the sidecar, and opencode installs
        # @opencode-ai/plugin et al. into node_modules under that path on
        # first boot — measured at ~57Mi. The earlier 16Mi cap got the Pod
        # evicted mid-conversation; 256Mi gives plenty of headroom without
        # paying for it on disk (emptyDir.sizeLimit is a quota, not a
        # reservation).
        - name: oc-config
          emptyDir:
            sizeLimit: 256Mi
        - name: oc-home
          emptyDir:
            sizeLimit: 512Mi
---
# ClusterIP — the Gateway resource below is the single entry point.
apiVersion: v1
kind: Service
metadata:
  name: knaic-backend
  namespace: knaic-system   # EDIT
  labels:
    app.kubernetes.io/name: knaic-backend
    app.kubernetes.io/part-of: knaic
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: knaic-backend
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
---
# TLS for the knaic UI is terminated by the Gateway below. cert-manager
# issues a cert for the configured hostname (signed by the ClusterIssuer
# named in `issuerRef.name`) and stores it in the Secret `knaic-tls-cert`.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: knaic-tls
  namespace: knaic-system   # EDIT
spec:
  secretName: knaic-tls-cert
  duration: 2160h    # 90 days
  renewBefore: 360h  # renew 15 days before expiry
  privateKey:
    algorithm: RSA
    size: 2048
    rotationPolicy: Always
  commonName: knaic.example.com   # EDIT
  dnsNames:
    - knaic.example.com           # EDIT
  issuerRef:
    kind: ClusterIssuer
    name: my-cluster-issuer       # EDIT
    group: cert-manager.io
---
# Standard Gateway API Gateway. The cluster must ship a GatewayClass
# capable of provisioning a data plane (e.g. envoy-gateway, contour, etc.).
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: knaic
  namespace: knaic-system   # EDIT
spec:
  gatewayClassName: REPLACE_WITH_YOUR_GATEWAYCLASS   # EDIT
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: knaic.example.com   # EDIT
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: knaic-tls-cert
      allowedRoutes:
        namespaces:
          from: Same
---
# Routes everything reaching the Gateway under the configured hostname to
# the knaic-backend ClusterIP Service. The Go binary serves both the React
# UI at / and the API at /api/v1.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: knaic
  namespace: knaic-system   # EDIT
spec:
  parentRefs:
    - name: knaic
  hostnames:
    - knaic.example.com   # EDIT (must match the Gateway listener above)
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: knaic-backend
          port: 8080
